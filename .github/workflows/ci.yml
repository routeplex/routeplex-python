name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify imports
        run: python -c "from routeplex import RoutePlex, ChatResponse, Message, Usage, RoutePlexError; print('OK')"

      - name: Build package
        run: |
          pip install build
          python -m build
